server {
    listen 80;
    server_name sharjon.ir www.sharjon.ir;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sharjon.ir www.sharjon.ir;

    ssl_certificate /etc/letsencrypt/live/sharjon.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sharjon.ir/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
